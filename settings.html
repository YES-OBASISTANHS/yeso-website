<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/your-kit.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="admin-container">

<!-- Sidebar -->

<aside class="sidebar">

<img src="images/logo.png" class="logo">

<h2>YES-O</h2>

<ul>

<li><a href="admin.html">📊 Dashboard</a></li>

<li class="active"><a href="settings.html">⚙ Settings</a></li>

</ul>

</aside>

<!-- Main -->

<main class="main-content">

<h1>⚙ Website Settings</h1>

<p>Manage your YES-O Digital Hub configuration.</p>

<!-- Organization -->

<div class="card">

<h2>Organization Information</h2>

<label>Organization Name</label>

<input type="text" id="orgName" value="YES-O Digital Hub">

<label>School Name</label>

<input type="text" id="schoolName">

<label>School Address</label>

<input type="text" id="schoolAddress">

<label>Email</label>

<input type="email" id="email">

<label>Contact Number</label>

<input type="text" id="contact">

<button id="saveInfo">Save Information</button>

</div>

<!-- Appearance -->

<div class="card">

<h2>Appearance</h2>

<button id="darkToggle">🌙 Toggle Dark Mode</button>

</div>

<!-- Social Media -->

<div class="card">

<h2>Social Media</h2>

<label>Facebook</label>

<input type="url" id="facebook">

<label>TikTok</label>

<input type="url" id="tiktok">

<label>Instagram</label>

<input type="url" id="instagram">

<button id="saveSocial">Save Social Links</button>

</div>

<!-- Firebase -->

<div class="card">

<h2>Firebase Status</h2>

<p id="firebaseStatus">

🟡 Checking connection...

</p>

</div>

<!-- Backup -->

<div class="card">

<h2>Data Backup</h2>

<button id="backupBtn">

⬇ Download Backup

</button>

</div>

</main>

</div>

<script src="script.js"></script>
<script type="module" src="firebase.js"></script>
<script src="settings.js"></script>

</body>
</html>
